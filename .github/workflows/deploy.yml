name: Terraform (Plan||Apply||Destroy)
run-name: Terraform ${{ inputs.terraform_action }} ${{ inputs.workspace }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      workspace:
        description: 'The workspace to terraform against'
        required: true
        type: choice
        options:
          - prod
          - dev
      terraform_action:
        description: 'The terraform action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - "---"
          - destroy

concurrency:
  group: ${{ github.event.inputs.workspace }}-terraform
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  workspace: ${{ github.event.inputs.workspace }}
  terraform_action: ${{ github.event.inputs.terraform_action }}

jobs:
  terraform:
    name: Run Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Check Out Changes
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: configure aws production credentials
        if: env.workspace == 'prod'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: githubDeploymentWorkflow
          aws-region: ${{ vars.AWS_REGION }}
        
      - name: configure aws dev credentials
        if: env.workspace == 'dev'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEV_ROLE_ARN }}
          role-session-name: githubDeploymentWorkflow
          aws-region: ${{ vars.AWS_REGION }}

      - name: Detach legacy ecrv policy (one-time upgrade pre-requisite)
        if: env.workspace == 'dev' && env.terraform_action == 'apply'
        run: |
          aws iam detach-role-policy \
            --role-name dibbs-ce-pdph-dev-ecrv \
            --policy-arn arn:aws:iam::047719641506:policy/dibbs-ce-pdph-dev-ecrv-policy \
          && echo "Policy detached successfully" \
          || echo "Policy already detached or not found, continuing"

      - name: Terraform
        env:
          ACTION: ${{ env.terraform_action }}
          BUCKET: ${{ vars.TFSTATE_BUCKET }}
          DYNAMODB_TABLE: ${{ vars.TFSTATE_DYNAMODB_TABLE }}
          REGION: ${{ vars.AWS_REGION }}
          WORKSPACE: ${{ env.workspace }}
          TF_VAR_secret_manager__connection_string_version: ${{ env.workspace == 'prod' && secrets.PROD_SQL_CONNECTION_STRING || secrets.DEV_SQL_CONNECTION_STRING }}
          TF_VAR_secret_manager__auth_secret_version: ${{ env.workspace == 'prod' && secrets.PROD_AUTH_SECRET_VERSION || secrets.DEV_AUTH_SECRET_VERSION }}
          TF_VAR_secret_manager__auth_client_secret_version: ${{ env.workspace == 'prod' && secrets.PROD_AUTH_CLIENT_SECRET_VERSION || secrets.DEV_AUTH_CLIENT_SECRET_VERSION }}
        shell: bash
        run: |
          terraform init \
            -upgrade \
            -var-file="configs/$WORKSPACE.tfvars" \
            -backend-config "bucket=$BUCKET" \
            -backend-config "dynamodb_table=$DYNAMODB_TABLE" \
            -backend-config "region=$REGION" \
            || (echo "terraform init failed, exiting..." && exit 1)
          terraform workspace select -or-create "$WORKSPACE"
          if [ "$ACTION" == "plan" ]; then
            terraform plan -var-file="configs/$WORKSPACE.tfvars"
          fi
          if [ "$ACTION" == "apply" ]; then
            terraform apply -auto-approve -var-file="configs/$WORKSPACE.tfvars"
          fi
          if [ "$ACTION" == "plan-destroy" ]; then
            terraform plan -destroy -var-file="configs/$WORKSPACE.tfvars"
          fi
          if [ "$ACTION" == "destroy" ]; then
            terraform destroy -auto-approve -var-file="configs/$WORKSPACE.tfvars"
          fi